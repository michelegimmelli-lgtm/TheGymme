
<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="TheGymme - Calcolatore Calorie e Dispendio Energetico" />
    <title>TheGymme</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #F3F4F6; min-height: 100vh; }

      .contact-wrap {
        max-width: 760px;
        margin: 24px auto 48px;
        padding: 0 16px;
      }

      .contact-card {
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(17, 24, 39, 0.06);
      }

      .contact-card h2 {
        font-family: Arial, sans-serif;
        font-size: 1.3rem;
        color: #111827;
        margin-bottom: 8px;
      }

      .contact-card p {
        font-family: Arial, sans-serif;
        font-size: 0.95rem;
        color: #4b5563;
        margin-bottom: 16px;
      }

      .contact-form {
        display: grid;
        gap: 12px;
      }

      .contact-form label {
        font-family: Arial, sans-serif;
        font-size: 0.9rem;
        color: #111827;
        margin-bottom: 4px;
        display: inline-block;
      }

      .contact-form input,
      .contact-form textarea {
        width: 100%;
        font-family: Arial, sans-serif;
        font-size: 0.95rem;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        padding: 10px 12px;
        outline: none;
      }

      .contact-form input:focus,
      .contact-form textarea:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
      }

      .contact-form textarea {
        min-height: 120px;
        resize: vertical;
      }

      .contact-form button {
        border: 0;
        border-radius: 10px;
        background: #111827;
        color: #ffffff;
        font-family: Arial, sans-serif;
        font-size: 0.95rem;
        font-weight: 600;
        padding: 12px;
        cursor: pointer;
      }

      .contact-form button:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }

      .contact-status {
        font-family: Arial, sans-serif;
        font-size: 0.9rem;
        color: #374151;
        min-height: 1.2em;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <section class="contact-wrap" aria-labelledby="contact-title">
      <div class="contact-card">
        <h2 id="contact-title">Contattami</h2>
        <p>Hai domande o feedback? Scrivimi qui.</p>

        <form id="contactForm" class="contact-form" novalidate>
          <input
            type="text"
            id="website"
            name="website"
            autocomplete="off"
            tabindex="-1"
            aria-hidden="true"
            style="position:absolute;left:-9999px;opacity:0;"
          />

          <div>
            <label for="name">Nome</label>
            <input id="name" name="name" type="text" required minlength="2" />
          </div>

          <div>
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required />
          </div>

          <div>
            <label for="message">Messaggio</label>
            <textarea id="message" name="message" required minlength="10"></textarea>
          </div>

          <button type="submit" id="contactSubmit">Invia messaggio</button>
          <p id="contactStatus" class="contact-status" aria-live="polite"></p>
        </form>
      </div>
    </section>

    <script>
      (function () {
        const form = document.getElementById("contactForm");
        const submitButton = document.getElementById("contactSubmit");
        const statusEl = document.getElementById("contactStatus");

        if (!form || !submitButton || !statusEl) return;

        form.addEventListener("submit", async function (event) {
          event.preventDefault();

          const formData = new FormData(form);
          const payload = {
            name: String(formData.get("name") || "").trim(),
            email: String(formData.get("email") || "").trim(),
            message: String(formData.get("message") || "").trim(),
            website: String(formData.get("website") || "").trim(),
          };

          if (payload.website) return;
          if (payload.name.length < 2 || payload.message.length < 10 || !payload.email) {
            statusEl.textContent = "Compila correttamente tutti i campi.";
            return;
          }

          submitButton.disabled = true;
          statusEl.textContent = "Invio in corso...";

          try {
            const response = await fetch("/api/contact", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                name: payload.name,
                email: payload.email,
                message: payload.message,
                website: payload.website,
              }),
            });

            if (!response.ok) {
              throw new Error("request_failed");
            }

            form.reset();
            statusEl.textContent = "Messaggio inviato con successo.";
          } catch (error) {
            statusEl.textContent = "Invio non riuscito. Riprova tra poco.";
          } finally {
            submitButton.disabled = false;
          }
        });
      })();
    </script>
  </body>
</html>
